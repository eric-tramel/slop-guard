[project]
site_name = "slop-guard Docs"
site_description = "Versioned documentation for slop-guard, a rule-based prose linter for formulaic AI writing."
site_author = "Eric Tramel"
site_url = "https://eric-tramel.github.io/slop-guard/docs/"
repo_url = "https://github.com/eric-tramel/slop-guard"
repo_name = "eric-tramel/slop-guard"
edit_uri = "edit/main/docs/"
copyright = """
Copyright &copy; 2026 Eric Tramel
"""
nav = [
  { "Overview" = "index.md" },
  { "Get Started" = "get-started.md" },
  { "Agents" = "agents.md" },
]

[project.theme]
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "navigation.footer",
  "navigation.path",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra.version]
provider = "mike"
default = ["latest", "dev"]
